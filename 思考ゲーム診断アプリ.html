<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="『思考ゲーム』診断メソッド。5つの質問に答えるだけで、あなたが今どのゲーム（資本主義・会社・情報・人生）にどう参加しているかを可視化し、PEST分析でゲームチェンジの兆しを読み、6つの思考法から勝ち筋の方向を導き出す。">
<title>思考ゲーム診断 | 世界のルールを見抜く思考法</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Shippori+Mincho:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #0f172a;
  --accent: #d4af37;
  --accent-glow: rgba(212, 175, 55, 0.35);
  --accent2: #38bdf8;
  --text-main: #f8fafc;
  --text-sub: #94a3b8;
  --text-muted: #64748b;
  --bg-dark: #020617;
  --card-bg: #111c34;
  --card-border: rgba(255,255,255,0.08);
  --field-bg: rgba(255,255,255,0.04);
  --transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);

  /* game categorical palette — validated (dark, surface #0f172a): CVD-safe order */
  --c-company:  #3987e5;
  --c-life:     #199e70;
  --c-capital:  #c98500;
  --c-info:     #9085e9;

  /* status (fixed, never reused as categorical) */
  --s-good: #0ca30c;
  --s-warn: #fab219;
  --s-crit: #d03b3b;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans JP', 'Inter', sans-serif;
  background: var(--bg-dark);
  color: var(--text-main);
  line-height: 1.8;
  min-height: 100vh;
}

.bg-mesh {
  position: fixed; inset: 0; z-index: -1;
  background:
    radial-gradient(circle at 8% 15%, rgba(15,23,42,0.9) 0%, transparent 42%),
    radial-gradient(circle at 92% 85%, rgba(30,41,59,0.9) 0%, transparent 42%),
    rgba(2,6,23,1);
}

h1, h2, h3 { font-family: 'Shippori Mincho', serif; letter-spacing: -0.01em; }

a { color: inherit; }

.wrap { max-width: 760px; margin: 0 auto; padding: 0 1.4rem; }

/* ---------- top bar ---------- */
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(2,6,23,0.85);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--card-border);
}
.topbar-inner {
  max-width: 760px; margin: 0 auto; padding: 0.9rem 1.4rem;
  display: flex; align-items: center; gap: 1rem;
}
.topbar-title {
  font-family: 'Shippori Mincho', serif; font-weight: 700; font-size: 0.95rem;
  white-space: nowrap;
}
.topbar-title span { color: var(--accent); }
.progress-track {
  flex: 1; height: 4px; border-radius: 4px; background: rgba(255,255,255,0.08); overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  transition: width 0.4s ease;
}
.progress-label { font-size: 0.75rem; color: var(--text-sub); white-space: nowrap; font-variant-numeric: tabular-nums; }

/* ---------- main stage ---------- */
main { padding: 2.6rem 0 5rem; }

.badge {
  display: inline-flex; align-items: center; gap: 0.4rem;
  padding: 0.32rem 0.8rem; border-radius: 50px;
  font-size: 0.72rem; font-weight: 700; letter-spacing: 0.03em;
  border: 1px solid currentColor;
}

.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 20px;
  padding: 2.2rem 2rem;
  box-shadow: 0 20px 50px rgba(0,0,0,0.35);
}
@media (max-width: 640px) { .card { padding: 1.6rem 1.3rem; border-radius: 16px; } }

.step-kicker { font-size: 0.8rem; color: var(--text-sub); margin-bottom: 0.6rem; font-weight: 600; }
.step-q { font-size: 1.32rem; font-weight: 700; margin-bottom: 1.5rem; font-family: 'Shippori Mincho', serif; line-height: 1.6; }
.step-sub { font-size: 0.88rem; color: var(--text-sub); margin: -1rem 0 1.5rem; }

.opt-list { display: flex; flex-direction: column; gap: 0.7rem; }
.opt {
  display: flex; align-items: flex-start; gap: 0.8rem;
  text-align: left; width: 100%;
  padding: 1rem 1.1rem;
  background: var(--field-bg);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  color: var(--text-main);
  font-size: 0.95rem;
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
}
.opt:hover { border-color: var(--accent2); background: rgba(56,189,248,0.08); }
.opt.selected { border-color: var(--accent); background: rgba(212,175,55,0.12); }
.opt .mark {
  flex: 0 0 auto; width: 20px; height: 20px; margin-top: 2px;
  border-radius: 6px; border: 1.5px solid var(--text-muted);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; color: transparent;
}
.opt.selected .mark { border-color: var(--accent); background: var(--accent); color: #1a1400; }
.opt-list.radio .mark { border-radius: 50%; }

.textarea-field {
  width: 100%; min-height: 110px; resize: vertical;
  background: var(--field-bg); border: 1px solid var(--card-border);
  border-radius: 12px; padding: 0.9rem 1rem; color: var(--text-main);
  font-family: inherit; font-size: 0.92rem; line-height: 1.7;
}
.textarea-field:focus, .opt:focus-visible { outline: 2px solid var(--accent2); outline-offset: 1px; }
.textarea-field::placeholder { color: var(--text-muted); }

.nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 2rem; gap: 1rem; }
.btn {
  appearance: none; border: none; cursor: pointer;
  font-family: inherit; font-weight: 700; font-size: 0.9rem;
  border-radius: 50px; padding: 0.8rem 1.6rem;
  transition: var(--transition);
}
.btn-primary { background: var(--accent); color: #1a1400; }
.btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 24px var(--accent-glow); }
.btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-ghost { background: transparent; color: var(--text-sub); border: 1px solid var(--card-border); }
.btn-ghost:hover { color: var(--text-main); border-color: var(--text-sub); }
.btn-outline { background: transparent; color: var(--accent2); border: 1px solid var(--accent2); }
.btn-outline:hover { background: rgba(56,189,248,0.1); }

/* ---------- intro ---------- */
.intro-hero { text-align: center; padding: 1rem 0 2.4rem; }
.intro-hero .kicker { color: var(--accent); font-weight: 700; letter-spacing: 0.08em; font-size: 0.85rem; margin-bottom: 0.9rem; }
.intro-hero h1 { font-size: 2rem; line-height: 1.5; margin-bottom: 1rem; }
.intro-hero h1 .accent { color: var(--accent); }
.intro-hero p { color: var(--text-sub); font-size: 0.98rem; max-width: 560px; margin: 0 auto; }

.method-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.8rem; margin: 2rem 0; }
@media (max-width: 560px) { .method-grid { grid-template-columns: 1fr; } }
.method-card {
  background: var(--field-bg); border: 1px solid var(--card-border); border-radius: 14px;
  padding: 1rem 1.1rem;
}
.method-card .num { font-family:'Shippori Mincho',serif; color: var(--accent2); font-weight: 700; font-size: 0.85rem; }
.method-card .name { font-weight: 700; margin: 0.2rem 0 0.3rem; }
.method-card .desc { font-size: 0.82rem; color: var(--text-sub); }

.resume-banner {
  background: rgba(56,189,248,0.1); border: 1px solid rgba(56,189,248,0.35);
  border-radius: 14px; padding: 1rem 1.2rem; margin-bottom: 1.6rem;
  display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 0.8rem;
}
.resume-banner p { font-size: 0.88rem; color: var(--text-main); }
.resume-actions { display: flex; gap: 0.6rem; }

/* ---------- results ---------- */
.section-title { font-size: 1.25rem; margin: 2.6rem 0 1.1rem; display: flex; align-items: center; gap: 0.6rem; }
.section-title .idx {
  width: 30px; height: 30px; border-radius: 50%; background: var(--accent); color: #1a1400;
  display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.85rem; flex: 0 0 auto;
}
.section-note { font-size: 0.85rem; color: var(--text-sub); margin: -0.6rem 0 1.2rem 2.4rem; }

.bar-row { display: grid; grid-template-columns: 150px 1fr 46px; align-items: center; gap: 0.8rem; margin-bottom: 0.85rem; }
.bar-row .label { font-size: 0.85rem; font-weight: 600; }
.bar-track { height: 20px; border-radius: 10px; background: rgba(255,255,255,0.06); overflow: hidden; position: relative; }
.bar-fill { height: 100%; border-radius: 10px 4px 4px 10px; min-width: 6px; }
.bar-row .val { font-size: 0.82rem; color: var(--text-sub); text-align: right; font-variant-numeric: tabular-nums; }
@media (max-width: 560px) { .bar-row { grid-template-columns: 84px 1fr 40px; } .bar-row .label { font-size: 0.76rem; } }

.game-block { border: 1px solid var(--card-border); border-radius: 16px; padding: 1.4rem 1.5rem; margin-bottom: 1.1rem; background: var(--field-bg); }
.game-block .head { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.6rem; }
.dot { width: 12px; height: 12px; border-radius: 50%; flex: 0 0 auto; }
.game-block h3 { font-size: 1.05rem; }
.game-block .diag { font-size: 0.9rem; color: var(--text-sub); margin-bottom: 0.7rem; }
.tip-list { list-style: none; display: flex; flex-direction: column; gap: 0.35rem; }
.tip-list li { font-size: 0.84rem; color: var(--text-main); padding-left: 1.1rem; position: relative; }
.tip-list li::before { content: "→"; position: absolute; left: 0; color: var(--accent2); }

.pest-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.55rem; margin-top: 0.8rem; }
@media (max-width: 560px) { .pest-grid { grid-template-columns: repeat(2, 1fr); } }
.pest-chip {
  border-radius: 10px; padding: 0.55rem 0.6rem; font-size: 0.74rem; text-align: center;
  border: 1px solid var(--card-border); color: var(--text-muted);
}
.pest-chip.on { color: #fff; font-weight: 700; }
.pest-chip .k { display:block; font-family:'Shippori Mincho',serif; font-size: 0.95rem; margin-bottom: 0.15rem; }

.method-result {
  display: grid; grid-template-columns: 26px 1fr; gap: 0.7rem 0.9rem; align-items: start;
  padding: 0.9rem 0; border-top: 1px solid var(--card-border);
}
.method-result:first-child { border-top: none; }
.method-result .rank { color: var(--accent2); font-weight: 800; font-family:'Shippori Mincho',serif; }
.method-result .name-row { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
.method-result h4 { font-size: 1rem; }
.method-result .desc { font-size: 0.85rem; color: var(--text-sub); margin-top: 0.3rem; }
.method-result .action { font-size: 0.85rem; color: var(--text-main); margin-top: 0.4rem; background: rgba(212,175,55,0.08); border-left: 2px solid var(--accent); padding: 0.5rem 0.7rem; border-radius: 0 8px 8px 0; }
.top-tag { font-size: 0.68rem; font-weight: 800; color: #1a1400; background: var(--accent); padding: 0.15rem 0.5rem; border-radius: 50px; }

.sheet-field { margin-bottom: 1.1rem; }
.sheet-field label { display: block; font-size: 0.88rem; font-weight: 700; margin-bottom: 0.4rem; }
.sheet-field .hint { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 0.4rem; }

.export-row { display: flex; flex-wrap: wrap; gap: 0.7rem; margin: 2.2rem 0 1rem; }

.footnote { text-align: center; font-size: 0.78rem; color: var(--text-muted); margin-top: 2.6rem; }

/* ---------- print ---------- */
@media print {
  body { background: #fff !important; color: #111 !important; }
  .bg-mesh, .topbar, .export-row, .btn, .nav-row { display: none !important; }
  .card { background: #fff !important; border: 1px solid #ccc !important; box-shadow: none !important; color: #111 !important; }
  .game-block, .pest-chip, .method-result, .bar-track { background: #fff !important; border-color: #ccc !important; }
  .bar-fill { filter: grayscale(0.15); }
  .step-sub, .section-note, .desc, .diag, .footnote, .text-sub, .top-tag { color: #333 !important; }
  a { text-decoration: none; }
}
</style>
</head>
<body>
<div class="bg-mesh"></div>

<div class="topbar">
  <div class="topbar-inner">
    <div class="topbar-title">思考ゲーム<span>診断</span></div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel"></div>
  </div>
</div>

<main class="wrap" id="app"></main>

<script>
/* =========================================================
   DATA — 5要素/5つの問い/PEST/6つの思考法 を土台にした診断ロジック
   ========================================================= */

const METHODS = [
  { id:'compare',  name:'比較思考',       desc:'目の前の選択肢を、他の選択肢と並べて評価する。', action:'次の判断の前に「他に取り得た選択肢」を最低ひとつ書き出してから決めてみてください。' },
  { id:'sim',      name:'シミュレーション思考', desc:'行動する前に、頭の中で展開を先読みする。', action:'「もしこれを選んだら、半年後どうなっているか」を一文で書き出してから動いてみてください。' },
  { id:'multi',    name:'多面的思考',     desc:'自分以外のプレイヤーの視点から状況を見る。', action:'この状況に関わる「自分以外の誰か」を1人思い浮かべ、その人の目的を書き出してみてください。' },
  { id:'hypo',     name:'仮説思考',       desc:'正解がわからない中で仮説を立て、動きながら検証する。', action:'「このゲームのルールは、おそらくこうなっている」という仮説を一文にしてみてください。' },
  { id:'position', name:'ポジショニング思考', desc:'努力の量より先に、どこで戦うかを選び直す。', action:'今の土俵で努力量を増やす前に、「自分の強みが最も生きる場所はどこか」を考えてみてください。' },
  { id:'long',     name:'長期思考',       desc:'目の前の勝敗ではなく、長期的な複利効果を見据える。', action:'この判断は短期戦か長期戦かを自問し、長期戦なら焦らず「続けられる形」を優先してみてください。' },
];

function bucket(score){ return score >= 70 ? 'high' : score >= 40 ? 'mid' : 'low'; }

const GAMES = [
  {
    id: 'capital', name: '資本主義というゲーム', short: '資本主義', colorVar: '--c-capital',
    tagline: '目的は「資本を増やし続けること」。利益はゴールではなく次の投資の燃料。',
    diag: {
      low:  '労働の対価（給料）だけがすべての物差しになっていて、資本を増やすという、このゲームのそもそもの目的にまだ意識が向いていない状態です。',
      mid:  '資本を増やすという目的は理解しているものの、実際の行動（再投資・情報収集）にはまだ十分に落とし込めていない段階です。',
      high: '労働で得た対価を資本に変え、情報の非対称性や金利・規制の変化にも目を配りながら、このゲームの目的に沿って動けています。',
    },
    questions: [
      { q:'今、力を入れているのはどちらですか。', options:[
        { label:'主に「働いて得る収入」を増やすこと', score:20, method:{position:2}, tip:'給料という「ゲーム内通貨」を、資本という「複利で増える通貨」に変える意識を持ってみてください。' },
        { label:'収入の一部を「貯蓄・投資などの資本」に変えること', score:70, method:{long:1} },
        { label:'収入を増やすことと、資本に変えることの両方をバランスよく', score:90, method:{long:2, position:1} },
        { label:'正直、あまり意識したことがない', score:10, method:{hypo:1, compare:1}, tip:'まずは「利益はゴールではなく、次の投資の燃料である」という前提から意識してみてください。' },
      ]},
      { q:'「有限責任」や「情報の非対称性」という言葉について。', options:[
        { label:'初めて聞いた、意識したことがなかった', score:15, method:{multi:2}, tip:'市場は誰にでも開かれていても、情報が届くタイミングは平等ではありません。「誰が、どんな情報を先に持っているか」に注意を向けてみてください。' },
        { label:'言葉は知っているが、自分の行動には反映していない', score:45, method:{multi:1, hypo:1} },
        { label:'知っていて、情報の入手タイミングやリスクの取り方に活かしている', score:85, method:{position:1} },
      ]},
      { q:'値上がり・値下がりのニュースを見たとき、どこまで考えますか。', options:[
        { label:'「自分には関係ない」で終わることが多い', score:20, method:{compare:2}, tip:'「これは自分にとって得か損か」を、比較対象を持って考える癖をつけてみてください。' },
        { label:'「これは自分にとって得か損か」を考える', score:55, method:{compare:1, sim:1} },
        { label:'「次に何が起きるか」まで考えて、次の一手を決めている', score:90, method:{sim:2} },
      ]},
    ],
    pest: [
      { k:'P', label:'金利政策・税制・規制の変更' },
      { k:'E', label:'景気後退・インフレ・為替の変動' },
      { k:'S', label:'消費や働き方への価値観の変化' },
      { k:'T', label:'AIによる「何が資本になるか」の再定義' },
    ],
  },
  {
    id: 'company', name: '会社というゲーム', short: '会社', colorVar: '--c-company',
    tagline: '組織の目的は個人の給料や成長ではなく、存続と成長。評価は能力より不確実性の低さで決まりやすい。',
    diag: {
      low:  '成果物の質だけを物差しにしていて、「組織にとっての不確実性を減らせるか」という、このゲームの評価軸にはまだ気づけていない状態です。',
      mid:  '暗黙のルールの存在にはうすうす気づいているものの、まだ言葉にして検証するところまでは至っていない段階です。',
      high: '暗黙のルールを観察し、変化の兆しにも早めに動けていて、このゲームの評価軸を理解した上でプレイできています。',
    },
    questions: [
      { q:'評価されている人に共通するのは何だと思いますか。', options:[
        { label:'成果物の質が高ければ、それだけで評価されると思う', score:25, method:{multi:2, hypo:1}, tip:'成果物を見る人・評価を決める人・評価に影響を与える人は、別々に存在していることがあります。誰が自分を見ているかを把握してみてください。' },
        { label:'事前の相談・報告・進捗共有が評価に影響していると感じる', score:80, method:{} },
        { label:'経営層や声の大きい人に近いかどうかが大きい', score:55, method:{position:1, multi:1} },
        { label:'正直、評価の理由がよくわからない', score:15, method:{hypo:2}, tip:'「このゲームでは何が評価されているのか」を、一度仮説として言葉にしてみてください。' },
      ]},
      { q:'暗黙のルールについて、当てはまるのは。', options:[
        { label:'意識して観察し、言葉にしたことがある', score:85, method:{position:1} },
        { label:'なんとなく感じるが、言葉にはしていない', score:50, method:{hypo:2}, tip:'「誰の名前が決裁の場で繰り返し出てくるか」「トラブル時、誰が最初に呼ばれるか」を観察してみてください。' },
        { label:'就業規則など明文化されたルールしか見ていない', score:20, method:{multi:2, hypo:1}, tip:'評価を実際に左右しているのは、明文化されていない暗黙のルールであることが少なくありません。' },
      ]},
      { q:'人事異動や組織再編が起きたとき、どう動きますか。', options:[
        { label:'これまでのやり方をそのまま続ける', score:15, method:{sim:1, hypo:1}, tip:'ゲームチェンジが起きたのに古いルールでプレイし続けることが、最も損をする行動です。' },
        { label:'少し様子を見てから、必要ならやり方を変える', score:55, method:{sim:1} },
        { label:'変化の兆しの段階で、すでに動き方を調整し始めている', score:90, method:{sim:2} },
      ]},
    ],
    pest: [
      { k:'P', label:'経営者交代・組織再編・人事制度の変更' },
      { k:'E', label:'業績悪化・M&A・予算縮小' },
      { k:'S', label:'成果主義化など評価観・働き方の変化' },
      { k:'T', label:'AIによる業務代替・評価の自動化' },
    ],
  },
  {
    id: 'info', name: '情報というゲーム', short: '情報', colorVar: '--c-info',

const LIFE_SUBGAMES = ['仕事', '家庭', '健康', '資産・お金'];

/* =========================================================
   STEP BUILD — intro → 年代/状況 → 各ゲームの設問+PEST → 結果
   ========================================================= */

function buildSteps(){
  const steps = [{ type:'intro' }];
  steps.push({ type:'age' });
  steps.push({ type:'situation' });
  GAMES.forEach(g=>{
    g.questions.forEach((q, qi)=>{
      steps.push({ type:'q', gameId:g.id, qIndex:qi });
    });
    if (g.id === 'life') steps.push({ type:'lifegames' });
    steps.push({ type:'pest', gameId:g.id });
  });
  steps.push({ type:'results' });
  return steps;
}
const STEPS = buildSteps();

/* =========================================================
   STATE + PERSISTENCE
   ========================================================= */
const STORE_KEY = 'thinkingGameDiagnosis_v1';
let state = loadState() || {
  step: 0,
  age: null,
  situation: '',
  answers: {},   // "gameId:qIndex" -> optionIndex
  pest: {},      // gameId -> [k,...]
  lifeGames: [], // selected sub-games
  sheet: { g:'', p1:'', p2:'', p3:'', p4:'', p5:'' },
};

function saveState(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
function loadState(){
  try { const raw = localStorage.getItem(STORE_KEY); return raw ? JSON.parse(raw) : null; }
  catch(e){ return null; }
}
function resetAll(){
  localStorage.removeItem(STORE_KEY);
  state = { step:0, age:null, situation:'', answers:{}, pest:{}, lifeGames:[], sheet:{g:'',p1:'',p2:'',p3:'',p4:'',p5:''} };
  booting = false;
  render();
}

let booting = state.step > 0; // true only while a saved session awaits an explicit resume/restart choice

/* =========================================================
   SCORING
   ========================================================= */
function computeResults(){
  const gameScores = {};
  const methodPoints = { compare:0, sim:0, multi:0, hypo:0, position:0, long:0 };
  const gameTips = {};

  GAMES.forEach(g=>{
    let total = 0, count = 0;
    const tips = [];
    g.questions.forEach((q, qi)=>{
      const key = g.id+':'+qi;
      const ansIdx = state.answers[key];
      if (ansIdx === undefined) return;
      const opt = q.options[ansIdx];
      total += opt.score; count++;
      if (opt.method) Object.keys(opt.method).forEach(m=> methodPoints[m] += opt.method[m]);
      if (opt.tip) tips.push(opt.tip);
    });
    gameScores[g.id] = count ? Math.round(total / count) : 0;
    gameTips[g.id] = tips;
  });

  // 人生ゲーム: 同時進行数が多いのに配分意識が低い場合、ポジショニング/長期思考を補強
  if (state.lifeGames && state.lifeGames.length >= 3){
    methodPoints.position += 1;
    methodPoints.long += 1;
  }

  const methodRanked = METHODS.map(m=>({...m, score: methodPoints[m.id]}))
    .sort((a,b)=> b.score - a.score);
  const maxMethod = Math.max(1, ...methodRanked.map(m=>m.score));

  return { gameScores, gameTips, methodRanked, maxMethod };
}

/* =========================================================
   RENDER HELPERS
   ========================================================= */
function esc(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function currentStepIndex(){
  if (booting && state.step > 0) return 0; // force the intro/resume screen until the user chooses
  return Math.min(state.step, STEPS.length-1);
}

function updateTopbar(){
  const idx = currentStepIndex();
  const pct = Math.round((idx / (STEPS.length-1)) * 100);
  document.getElementById('progressFill').style.width = pct+'%';
  const label = idx >= STEPS.length-1 ? '結果' : (idx===0 ? 'はじめに' : (idx+1)+' / '+(STEPS.length-1));
  document.getElementById('progressLabel').textContent = label;
}

function goto(i){ state.step = Math.max(0, Math.min(i, STEPS.length-1)); saveState(); render(); window.scrollTo({top:0, behavior:'smooth'}); }
function next(){ goto(state.step+1); }
function prev(){ goto(state.step-1); }

function isAnswered(step){
  if (step.type === 'age') return !!state.age;
  if (step.type === 'situation') return true; // optional
  if (step.type === 'q') return state.answers[step.gameId+':'+step.qIndex] !== undefined;
  if (step.type === 'lifegames') return state.lifeGames.length > 0;
  if (step.type === 'pest') return (state.pest[step.gameId]||[]).length > 0;
  return true;
}

/* =========================================================
   RENDER — per step type
   ========================================================= */
function render(){
  updateTopbar();
  const step = STEPS[currentStepIndex()];
  const app = document.getElementById('app');
  let html = '';

  switch(step.type){
    case 'intro': html = renderIntro(); break;
    case 'age': html = renderAge(); break;
    case 'situation': html = renderSituation(); break;
    case 'q': html = renderQuestion(step); break;
    case 'lifegames': html = renderLifeGames(); break;
    case 'pest': html = renderPest(step); break;
    case 'results': html = renderResults(); break;
  }
  app.innerHTML = html;
  attachHandlers(step);
}

      ${sheetField('p2','②プレイヤーは誰か','表舞台に立つ人だけでなく、ルールを作る人、影響力を持つ人まで含めて誰が関わっているか。')}
      ${sheetField('p3','③ルールは何か','明文化されたルールは何か。明文化されていない暗黙のルールは何か。')}
      ${sheetField('p4','④勝者はどうやって生まれるのか','評価されている人、うまくいっている人は、具体的に何をしているか。')}
      ${sheetField('p5','⑤ゲームチェンジは何によって起こるのか','このゲームのルールは、今後何をきっかけに変わりそうか。')}
      <p style="font-size:0.85rem; color:var(--text-sub); margin-top:0.4rem;">書き込んだ内容は自動保存され、下の「テキストとして保存」に含まれます。</p>
    </div>

    <div class="export-row">
      <button class="btn btn-outline" data-action="print">🖨 印刷する</button>
      <button class="btn btn-outline" data-action="export">結果をテキストで保存</button>
      <button class="btn btn-ghost" data-action="reset">最初からやり直す</button>
    </div>
    <p class="footnote">『思考ゲーム ―― 世界のルールを見抜く思考法』の5つの問い・6つの思考法をもとにした自己診断です。診断結果は断定ではなく、ゲームを読み直すための出発点として使ってください。</p>
  `;
}

function sheetField(key, label, hint){
  return `
    <div class="sheet-field">
      <label>${label}</label>
      <div class="hint">${hint}</div>
      <textarea class="textarea-field" style="min-height:70px;" data-sheet="${key}" placeholder="自分の言葉で書いてみる">${esc(state.sheet[key]||'')}</textarea>
    </div>`;
}

/* =========================================================
   EVENTS
   ========================================================= */
function attachHandlers(step){
  const app = document.getElementById('app');

  app.querySelectorAll('[data-action="next"]').forEach(b=>b.addEventListener('click', next));
  app.querySelectorAll('[data-action="prev"]').forEach(b=>b.addEventListener('click', prev));
  app.querySelectorAll('[data-action="start"]').forEach(b=>b.addEventListener('click', ()=>{ booting=false; goto(1); }));
  app.querySelectorAll('[data-action="resume"]').forEach(b=>b.addEventListener('click', ()=>{ booting=false; render(); }));
  app.querySelectorAll('[data-action="reset"]').forEach(b=>b.addEventListener('click', ()=>{ if(confirm('回答をすべて消して最初からやり直しますか？')) resetAll(); }));
  app.querySelectorAll('[data-action="print"]').forEach(b=>b.addEventListener('click', ()=> window.print()));
  app.querySelectorAll('[data-action="export"]').forEach(b=>b.addEventListener('click', exportText));

  if (step.type === 'age'){
    app.querySelectorAll('#optList .opt').forEach(el=>el.addEventListener('click', ()=>{
      state.age = el.dataset.value; saveState(); render();
    }));
  }
  if (step.type === 'situation'){
    const ta = document.getElementById('situationInput');
    ta.addEventListener('input', ()=>{ state.situation = ta.value; saveState(); });
  }
  if (step.type === 'q'){
    app.querySelectorAll('#optList .opt').forEach(el=>el.addEventListener('click', ()=>{
      const key = step.gameId+':'+step.qIndex;
      state.answers[key] = parseInt(el.dataset.idx,10);
      saveState(); render();
    }));
  }
  if (step.type === 'lifegames'){
    app.querySelectorAll('#optListMulti .opt').forEach(el=>el.addEventListener('click', ()=>{
      const v = el.dataset.value;
      const idx = state.lifeGames.indexOf(v);
      if (idx>=0) state.lifeGames.splice(idx,1); else state.lifeGames.push(v);
      saveState(); render();
    }));
  }
  if (step.type === 'pest'){
    app.querySelectorAll('#optListMulti .opt').forEach(el=>el.addEventListener('click', ()=>{
      const v = el.dataset.value;
      const arr = state.pest[step.gameId] || (state.pest[step.gameId]=[]);
      const idx = arr.indexOf(v);
      if (idx>=0) arr.splice(idx,1); else arr.push(v);
      saveState(); render();
    }));
  }
  if (step.type === 'results'){
    const gInput = document.getElementById('sheetG');
    if (gInput) gInput.addEventListener('input', ()=>{ state.sheet.g = gInput.value; saveState(); });
    app.querySelectorAll('[data-sheet]').forEach(ta=>{
      ta.addEventListener('input', ()=>{ state.sheet[ta.dataset.sheet] = ta.value; saveState(); });
    });
  }
}

/* =========================================================
   EXPORT
   ========================================================= */
function exportText(){
  const r = computeResults();
  const lines = [];
  lines.push('思考ゲーム診断結果');
  lines.push('='.repeat(30));
  lines.push('');
  if (state.age) lines.push('年代：'+state.age);
  if (state.lifeGames.length) lines.push('同時進行中のゲーム：'+state.lifeGames.join('・'));
  if (state.situation) lines.push('向き合っている状況：'+state.situation);
  lines.push('');
  lines.push('■ 参加している複数のゲーム（自覚度スコア）');
  GAMES.forEach(g=>{
    lines.push('・'+g.name+'：'+r.gameScores[g.id]+' 点');
    lines.push('  '+g.diag[bucket(r.gameScores[g.id])]);
    (r.gameTips[g.id]||[]).forEach(t=> lines.push('  → '+t));
    const pestSel = state.pest[g.id]||[];
    if (pestSel.length){
      const labels = g.pest.filter(p=>pestSel.includes(p.k)).map(p=>p.k+'：'+p.label);
      lines.push('  ゲームチェンジの兆し（PEST）：'+labels.join(' / '));
    }
    lines.push('');
  });
  lines.push('■ 勝ち筋の方向（6つの思考法・優先度順）');
  r.methodRanked.forEach((m,i)=>{
    lines.push((i+1)+'. '+m.name+'（スコア '+m.score+'）－ '+m.desc);
    if (i<3) lines.push('   おすすめの一手：'+m.action);
  });
  lines.push('');
  lines.push('■ 5つの問い実践シート（対象：'+state.sheet.g+'）');
  const sheetLabels = {
    p1:'①目的は何か', p2:'②プレイヤーは誰か', p3:'③ルールは何か',
    p4:'④勝者はどうやって生まれるのか', p5:'⑤ゲームチェンジは何によって起こるのか',
  };
  Object.keys(sheetLabels).forEach(k=>{
    lines.push(sheetLabels[k]+'：'+(state.sheet[k] || '（未記入）'));
  });
  lines.push('');
  lines.push('――『思考ゲーム ―― 世界のルールを見抜く思考法』診断メソッドより');

  const blob = new Blob([lines.join('\n')], { type:'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = '思考ゲーム診断結果.txt';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* =========================================================
   INIT
   ========================================================= */
render();
</script>
