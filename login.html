<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>ログイン | ModernLogic</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Noto+Sans+JP:wght@400;500;700&family=Outfit:wght@400;600;800&family=Shippori+Mincho:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="bg-mesh"></div>

  <header>
    <div class="container nav">
      <a href="index.html" class="logo" style="font-size: 1rem;"><img src="modernlogic.png" alt="Modern Logic" style="height: 2em;"></a>
    </div>
  </header>

  <main>
    <section style="min-height: 100vh; display: flex; align-items: center; padding: 160px 0 100px;">
      <div class="container" style="max-width: 460px;">
        <div class="glass-card">
          <div style="text-align: center; margin-bottom: 2rem;">
            <div class="card-icon" style="margin: 0 auto 1.5rem;"><i data-lucide="lock"></i></div>
            <h2 style="margin-bottom: 0.5rem;">実績ページ</h2>
            <p style="color: var(--text-sub); font-size: 0.9rem;">パスワードを入力してください</p>
          </div>
          <form id="gate-form" autocomplete="off">
            <input
              type="password"
              id="gate-password"
              placeholder="パスワード"
              autocomplete="new-password"
              value=""
              style="width: 100%; padding: 1rem 1.25rem; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.04); color: var(--text-main); font-size: 1rem; margin-bottom: 1rem;"
              required
            >
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
              入室する
            </button>
            <p id="gate-error" style="color: #ef4444; font-size: 0.85rem; margin-top: 1rem; text-align: center; display: none;">
              パスワードが正しくありません。
            </p>
          </form>
        </div>
      </div>
    </section>
  </main>

  <script>
    lucide.createIcons();

    const passwordField = document.getElementById('gate-password');
    passwordField.value = '';
    window.addEventListener('pageshow', () => { passwordField.value = ''; });
    window.addEventListener('load', () => { setTimeout(() => { passwordField.value = ''; }, 50); });

    const CORRECT_HASH = '4d3274ca0a62b367faa3e1f55009191bab94fcb2176aa19749bfa5fdd2df44bd';

    async function sha256Hex(text) {
      const data = new TextEncoder().encode(text);
      const digest = await crypto.subtle.digest('SHA-256', data);
      return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    const params = new URLSearchParams(window.location.search);
    const redirectTo = params.get('redirect') || 'portfolio.html';

    document.getElementById('gate-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const input = document.getElementById('gate-password').value;
      const hash = await sha256Hex(input);
      if (hash === CORRECT_HASH) {
        sessionStorage.setItem('mlPortfolioAuth', '1');
        window.location.href = redirectTo;
      } else {
        document.getElementById('gate-error').style.display = 'block';
      }
    });
  </script>
</body>
</html>
